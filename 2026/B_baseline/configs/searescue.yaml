# 数据集配置 · 低空水上救援（SeaDronesSee + AFO 合并的"海域"目标域）
# 由 prepare_data.py 生成对应目录结构后使用。
#
# 目录约定（prepare_data.py 输出）:
#   datasets/searescue/images/{train,val,test}
#   datasets/searescue/labels/{train,val,test}    # YOLO txt: cls cx cy w h (归一化)
path: ../datasets/searescue
train: images/train
val: images/val
test: images/test

# TODO[登录核对]: 以下类别为 SeaDronesSee/AFO 公开类别占位。
#   赛题7 真实识别目标（落水人员/遇险船只/救生设备 等）确认后，必须改这里的 names，
#   并在 prepare_data.py 的 CLASS_MAP 同步重映射，否则训练目标与赛题不一致。
names:
  0: swimmer        # 落水/泳者（救援核心目标）
  1: floater        # 漂浮人/物
  2: boat
  3: buoy           # 浮标
  4: life_jacket    # 救生衣/救生设备
# nc 由 names 自动推断（ultralytics 新版无需显式 nc）
